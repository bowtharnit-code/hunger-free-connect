<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hunger Free Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#ffe6f2;
            min-height:100vh;
        }

        .navbar{
            background:linear-gradient(45deg,#ff69b4,#ff8c00)!important;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.1);
        }

        .btn-theme{
            background:linear-gradient(45deg,#ff69b4,#ff8c00);
            color:white;
            border:none;
            border-radius:30px;
            padding:10px 25px;
            font-weight:bold;
        }

        .btn-theme:hover{
            color:white;
            opacity:0.9;
        }

        .container{
            animation:fadeIn 0.5s;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
            }
            to{
                opacity:1;
            }
        }

    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow">

        <div class="container">

            <a class="navbar-brand fw-bold" href="/">
                🍲 Hunger Free Connect
            </a>

        </div>

    </nav>

    <div class="container mt-4">

        {% block content %}

        {% endblock %}

    </div>

</body>

</html>
