<!DOCTYPE html>
<html>
<head>
    <title>Login - Hunger Free Connect</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: rgba(44, 165, 109, 0.59);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:30px;
            width:350px;
            border-radius:10px;
            box-shadow:0 0 15px hsla(0, 0%, 0%, 0.90);
        }

        h2{
            text-align:center;
            color:#2c3e50;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:15px;
            border:1px solid #cccccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:10px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

        .password-container{
            position:relative;
        }

        .eye{
            position:absolute;
            right:10px;
            top:20px;
            cursor:pointer;
        }

        p{
            text-align:center;
            margin-top:15px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <div class="password-container">
            <input type="password"
                   id="password"
                   name="password"
                   placeholder="Password"
                   required>

            <span class="eye"
                  onclick="togglePassword()">👁</span>
        </div>

        <button type="submit">Login</button>
    </form>

    <p>
        Don't have an account?
        <a href="/signup/">Sign Up</a>
    </p>
</div>

<script>
function togglePassword() {
    var password = document.getElementById("password");

    if (password.type === "password") {
        password.type = "text";
    } else {
        password.type = "password";
    }
}
</script>

</body>
</html>
