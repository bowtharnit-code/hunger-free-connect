<!DOCTYPE html>
<html>
<head>
    <title>Add Donation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#ffd6e7,#ffe5b4);
            min-height:100vh;
        }

        .form-card{
            background:white;
            border-radius:25px;
            padding:40px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.2);
        }

        .title{
            color:#d63384;
            font-weight:bold;
        }

        .submit-btn{
            background:linear-gradient(45deg,#ff69b4,#ff8c00);
            border:none;
            color:white;
            padding:12px;
            font-size:18px;
            border-radius:50px;
            width:100%;
            font-weight:bold;
        }

        .submit-btn:hover{
            opacity:0.9;
        }
    </style>

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="form-card">

                <h1 class="text-center title mb-4">
                    🍲 Add Food Donation
                </h1>

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="submit-btn">
                        Donate Food ❤️
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
